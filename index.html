<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapid Report — Gate Evasion Counter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="revenue.js"></script>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --tfl-blue: #003b8e;
        --tfl-blue-dark: #00286a;
        --tfl-red: #e21836;
        --tfl-red-dark: #b5102a;
        --tfl-yellow: #ffd400;
        --bg: #f5f5f5;
        --white: #ffffff;
        --border: #cccccc;
        --border-light: #e8e8e8;
        --text: #1a1a1a;
        --text-muted: #767676;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Overpass", Arial, sans-serif;
      }

      .app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: var(--white);
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
      }

      /* ── Header ── */
      .tfl-header {
        background: var(--tfl-blue);
      }

      .tfl-header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .roundel {
        width: 42px;
        height: 42px;
        flex-shrink: 0;
      }

      .header-title {
        color: white;
        font-size: 1.05rem;
        font-weight: 700;
      }

      .header-sub {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.68rem;
        margin-top: 1px;
        letter-spacing: 0.03em;
      }

      .live-pill {
        display: flex;
        align-items: center;
        gap: 5px;
        background: rgba(255, 255, 255, 0.15);
        padding: 4px 10px;
        border-radius: 2px;
        font-size: 0.65rem;
        font-weight: 700;
        color: white;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .live-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #7fff7f;
        animation: blink 1.5s ease infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .red-bar {
        height: 4px;
        background: var(--tfl-red);
      }

      /* ── Shift strip ── */
      .shift-strip {
        background: var(--tfl-blue-dark);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
      }

      .shift-cell {
        padding: 8px 6px;
        text-align: center;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }

      .shift-cell:last-child {
        border-right: none;
      }

      .sc-label {
        font-size: 0.56rem;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 2px;
      }

      .sc-value {
        font-size: 0.76rem;
        font-weight: 700;
        color: white;
      }

      /* ── Counter ── */
      .counter-block {
        padding: 24px 20px 18px;
        text-align: center;
        border-bottom: 1px solid var(--border-light);
        background: var(--white);
      }

      .counter-label {
        font-size: 0.68rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 4px;
      }

      .counter-num {
        font-size: 6rem;
        font-weight: 700;
        color: var(--tfl-blue);
        line-height: 1;
        letter-spacing: -0.02em;
        transition: transform 0.08s ease;
      }

      .counter-num.bump {
        transform: scale(1.06);
      }

      .counter-sub {
        font-size: 0.68rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 4px;
      }

      .revenue-range {
        margin-top: 12px;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--tfl-red);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      /* ── 80/20 Thumb-Memory Grid ── */
      .incident-grid {
        padding: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        background: var(--white);
        border-bottom: 1px solid var(--border-light);
      }

      .inc-btn {
        border: none;
        border-radius: 4px;
        cursor: pointer;
        padding: 0;
        position: relative;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        transition: transform 0.05s;
      }

      .inc-btn:active {
        transform: translateY(3px);
      }

      .inc-btn-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px 10px;
        pointer-events: none;
      }

      .inc-btn.primary {
        height: 110px;
        background: var(--tfl-blue);
        box-shadow: 0 5px 0 var(--tfl-blue-dark);
      }

      .inc-btn.secondary {
        grid-column: span 2;
        height: 65px;
        background: #2c2c2c;
        box-shadow: 0 4px 0 #000;
        margin-top: 5px;
      }

      .inc-label {
        font-size: 0.95rem;
        font-weight: 700;
        color: white;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .inc-sub {
        font-size: 0.6rem;
        color: rgba(255, 255, 255, 0.7);
        text-transform: uppercase;
        margin-top: 4px;
      }

      .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.22);
        transform: scale(0);
        animation: rpl 0.5s ease-out forwards;
        pointer-events: none;
      }

      @keyframes rpl {
        to {
          transform: scale(4);
          opacity: 0;
        }
      }

      /* ── Action/Undo row ── */
      .undo-row {
        border-bottom: 1px solid var(--border-light);
      }

      .act-btn {
        width: 100%;
        background: var(--white);
        border: none;
        padding: 14px 16px;
        cursor: pointer;
        text-align: center;
        transition: background 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        -webkit-tap-highlight-color: transparent;
      }

      .act-btn:active {
        background: #eef3ff;
      }

      .act-label {
        font-size: 0.76rem;
        font-weight: 700;
        color: var(--tfl-blue);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* ── Recent Activity ── */
      .sec-header {
        background: var(--tfl-blue);
        color: white;
        padding: 7px 16px;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .sec-badge {
        background: rgba(255, 255, 255, 0.18);
        padding: 2px 8px;
        border-radius: 2px;
        font-size: 0.62rem;
      }

      .activity-list {
        background: var(--white);
        flex: 1;
      }

      .activity-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 16px;
        border-bottom: 1px solid var(--border-light);
        animation: fadeIn 0.18s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          background: #eef3ff;
        }
        to {
          opacity: 1;
          background: transparent;
        }
      }

      .type-bar {
        width: 4px;
        height: 34px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .bar-double-gate {
        background: var(--tfl-blue);
      }
      .bar-push-through {
        background: var(--tfl-red);
      }
      .bar-other {
        background: #2c2c2c;
      }

      .act-type {
        font-size: 0.82rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .act-detail {
        font-size: 0.65rem;
        color: var(--text-muted);
        margin-top: 2px;
      }
      .act-time {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-muted);
        font-variant-numeric: tabular-nums;
      }

      .empty-state {
        padding: 28px 20px;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.8rem;
        line-height: 1.7;
      }

      /* ── Bottom Bar ── */
      .ejm-bar {
        background: var(--tfl-blue);
        padding: 5px 16px;
        text-align: right;
      }
      .ejm-text {
        font-size: 0.6rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .status-bar {
        background: #1a1a1a;
        padding: 8px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        bottom: 0;
      }

      .sb-left {
        font-size: 0.65rem;
        color: rgba(255, 255, 255, 0.55);
      }
      .sb-left span {
        color: white;
        font-weight: 600;
      }

      .end-btn {
        background: var(--tfl-red);
        color: white;
        border: none;
        padding: 6px 14px;
        border-radius: 2px;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
      }

      .end-btn:active {
        background: var(--tfl-red-dark);
      }

      /* ── Utils ── */
      .toast {
        position: fixed;
        bottom: 56px;
        left: 50%;
        transform: translateX(-50%) translateY(8px);
        background: #1a1a1a;
        color: white;
        padding: 9px 18px;
        border-radius: 3px;
        font-size: 0.74rem;
        font-weight: 700;
        opacity: 0;
        transition: all 0.2s ease;
        z-index: 999;
        border-left: 4px solid var(--tfl-blue);
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .flash {
        position: fixed;
        inset: 0;
        background: rgba(0, 59, 142, 0.07);
        pointer-events: none;
        opacity: 0;
        z-index: 500;
        transition: opacity 0.15s;
      }
      .flash.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="flash" id="flash"></div>
    <div class="toast" id="toast"></div>

    <div class="app">
      <div class="tfl-header">
        <div class="tfl-header-top">
          <div class="header-brand">
            <svg
              class="roundel"
              viewBox="0 0 42 42"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle cx="21" cy="21" r="20" fill="#003B8E" />
              <circle
                cx="21"
                cy="21"
                r="20"
                fill="none"
                stroke="#E21836"
                stroke-width="4.5"
              />
              <rect x="1" y="18" width="40" height="6" fill="#E21836" />
            </svg>
            <div>
              <div class="header-title">Rapid Report</div>
              <div class="header-sub">
                Operational Intelligence · Milestone 3
              </div>
            </div>
          </div>
          <div class="live-pill">
            <div class="live-dot"></div>
            Active
          </div>
        </div>
        <div class="red-bar"></div>
      </div>

      <div class="shift-strip">
        <div class="shift-cell">
          <div class="sc-label">Station</div>
          <div class="sc-value" id="scStation">—</div>
        </div>
        <div class="shift-cell">
          <div class="sc-label">Start</div>
          <div class="sc-value" id="scStart">—</div>
        </div>
        <div class="shift-cell">
          <div class="sc-label">Now</div>
          <div class="sc-value" id="scNow">—</div>
        </div>
        <div class="shift-cell">
          <div class="sc-label">Staff</div>
          <div class="sc-value">Marci</div>
        </div>
      </div>

      <div class="counter-block">
        <div class="counter-label">Total Incidents This Shift</div>
        <div class="counter-num" id="counterNum">0</div>
        <div class="counter-sub">Data-Point Accumulation</div>
        <div class="revenue-range" id="revenueRange" style="display: none">
          Est. Revenue at Risk: <span id="revMin">£0.00</span> –
          <span id="revMax">£0.00</span>
        </div>
      </div>

      <div class="incident-grid">
        <button class="inc-btn primary" id="doubleGateBtn">
          <div class="inc-btn-inner">
            <div class="inc-label">Double Gate</div>
            <div class="inc-sub">Tailgate · 1 Person</div>
          </div>
        </button>

        <button
          class="inc-btn primary"
          id="pushThroughBtn"
          style="
            background: var(--tfl-red);
            box-shadow: 0 5px 0 var(--tfl-red-dark);
          "
        >
          <div class="inc-btn-inner">
            <div class="inc-label">Push Through</div>
            <div class="inc-sub">Forced · 1 Person</div>
          </div>
        </button>

        <button class="inc-btn secondary" id="groupBtn">
          <div class="inc-btn-inner">
            <div class="inc-label">Group Entry</div>
            <div class="inc-sub">Multiple Evaders · Tap to specify count</div>
          </div>
        </button>
      </div>

      <div class="undo-row">
        <button class="act-btn" id="undoBtn">
          <div class="act-icon">↩</div>
          <span class="act-label">Undo Last Entry</span>
        </button>
      </div>

      <div class="sec-header">
        <span>Live Audit Trail</span>
        <span class="sec-badge" id="actBadge">0 Entries</span>
      </div>
      <div class="activity-list" id="activityList">
        <div class="empty-state">Standing by for gate-line input...</div>
      </div>

      <div class="ejm-bar">
        <span class="ejm-text">Every Journey Matters</span>
      </div>

      <div class="status-bar">
        <div class="sb-left">
          System: <span>PWA-v2.1</span> &nbsp;·&nbsp;
          <span id="sbStation">—</span>
        </div>
        <button class="end-btn" id="endBtn">End Shift</button>
      </div>
    </div>

    <script>
      let count = 0;
      let incidents = [];
      let totalMin = 0;
      let totalMax = 0;
      const shiftStart = new Date();
      const STATION = "My Station";

      const counterNum = document.getElementById("counterNum");
      const activityList = document.getElementById("activityList");
      const actBadge = document.getElementById("actBadge");
      const flashEl = document.getElementById("flash");
      const toastEl = document.getElementById("toast");

      // Init
      document.getElementById("scStation").textContent = STATION;
      document.getElementById("sbStation").textContent = STATION;
      document.getElementById("scStart").textContent = fmt(shiftStart);
      tick();
      setInterval(tick, 1000);
      loadData();
      refreshCounter();
      refreshList();

      function saveData() {
        const data = {
          count,
          totalMin,
          totalMax,
          incidents: incidents.map((i) => ({
            ...i,
            time: i.time.toISOString(),
          })),
        };
        localStorage.setItem("rapidReport", JSON.stringify(data));
      }

      function loadData() {
        const saved = localStorage.getItem("rapidReport");
        if (!saved) return;
        const data = JSON.parse(saved);
        count = data.count || 0;
        totalMin = data.totalMin || 0;
        totalMax = data.totalMax || 0;
        incidents = data.incidents.map((i) => ({
          ...i,
          time: new Date(i.time),
        }));
      }

      function tick() {
        document.getElementById("scNow").textContent = fmt(new Date());
      }
      function fmt(d) {
        return d.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function logIncident(type, label, amount, btnElement) {
        const fares = getCurrentFares(); // From revenue.js
        const minVal = fares.min * amount;
        const maxVal = fares.max * amount;

        count += amount;
        totalMin += minVal;
        totalMax += maxVal;

        incidents.unshift({
          time: new Date(),
          type,
          label,
          amount,
          fareLabel: fares.label,
          minVal,
          maxVal,
        });

        refreshCounter();
        refreshList();
        triggerFlash();
        if (btnElement) addRipple(btnElement);
        saveData();
      }

      function refreshCounter() {
        counterNum.textContent = count;
        counterNum.classList.add("bump");
        setTimeout(() => counterNum.classList.remove("bump"), 100);

        const rangeEl = document.getElementById("revenueRange");
        if (count > 0) {
          document.getElementById("revMin").textContent =
            `£${totalMin.toFixed(2)}`;
          document.getElementById("revMax").textContent =
            `£${totalMax.toFixed(2)}`;
          rangeEl.style.display = "block";
        } else {
          rangeEl.style.display = "none";
        }
      }

      function refreshList() {
        actBadge.textContent = `${incidents.length} Entries`;
        if (!incidents.length) {
          activityList.innerHTML = `<div class="empty-state">Standing by for gate-line input...</div>`;
          return;
        }
        activityList.innerHTML = incidents
          .slice(0, 6)
          .map(
            (i) => `
          <div class="activity-item">
            <div class="act-left">
              <div class="type-bar bar-${i.type}"></div>
              <div>
                <div class="act-type">${i.label}</div>
                <div class="act-detail">${i.amount > 1 ? i.amount + " people" : "1 person"} · ${i.fareLabel}</div>
              </div>
            </div>
            <div class="act-time">${fmt(i.time)}</div>
          </div>
        `,
          )
          .join("");
      }

      function triggerFlash() {
        flashEl.classList.add("show");
        setTimeout(() => flashEl.classList.remove("show"), 150);
      }

      function addRipple(btn) {
        const r = document.createElement("span");
        r.className = "ripple";
        const s = Math.max(btn.offsetWidth, btn.offsetHeight);
        r.style.cssText = `width:${s}px;height:${s}px;left:${btn.offsetWidth / 2 - s / 2}px;top:${btn.offsetHeight / 2 - s / 2}px`;
        btn.appendChild(r);
        setTimeout(() => r.remove(), 600);
      }

      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        setTimeout(() => toastEl.classList.remove("show"), 2200);
      }

      // ── Event Listeners ──
      document
        .getElementById("doubleGateBtn")
        .addEventListener("click", function () {
          logIncident("double-gate", "Double Gate", 1, this);
        });

      document
        .getElementById("pushThroughBtn")
        .addEventListener("click", function () {
          logIncident("push-through", "Push Through", 1, this);
        });

      document
        .getElementById("groupBtn")
        .addEventListener("click", function () {
          const n = parseInt(prompt("How many in the group?"));
          if (!isNaN(n) && n > 0) {
            logIncident("other", "Group Entry", n, this);
            showToast(`Group of ${n} logged`);
          }
        });

      document.getElementById("undoBtn").addEventListener("click", () => {
        if (!incidents.length) {
          showToast("Nothing to undo");
          return;
        }
        const last = incidents.shift();
        count = Math.max(0, count - last.amount);
        totalMin = Math.max(0, totalMin - (last.minVal || 0));
        totalMax = Math.max(0, totalMax - (last.maxVal || 0));
        refreshCounter();
        refreshList();
        showToast(`Removed: ${last.label}`);
        saveData();
      });

      document.getElementById("endBtn").addEventListener("click", () => {
        if (!count) {
          showToast("No incidents recorded");
          return;
        }
        if (
          confirm(
            `End shift?\n\nTotal: ${count}\nEst. Leak: £${totalMin.toFixed(2)}-£${totalMax.toFixed(2)}`,
          )
        ) {
          count = 0;
          totalMin = 0;
          totalMax = 0;
          incidents = [];
          localStorage.removeItem("rapidReport");
          refreshCounter();
          refreshList();
          showToast("Shift Data Cleared");
        }
      });
    </script>
  </body>
</html>
